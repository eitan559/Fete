<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>הזמנה · Fête</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/theme.css" />
  <link rel="icon" href="/logo.svg" />
</head>
<body data-theme="light">
  <div id="app" class="relative mx-auto flex min-h-screen max-w-2xl flex-col px-4 pb-24 pt-8 sm:px-6 sm:pt-12">
    <!-- Content rendered by JS -->
  </div>

  <script src="/common.js"></script>
  <script>
    const STORAGE_KEY = (slug) => "party_rsvp_" + slug;

    function getSlug() {
      // The slug arrives via clean URL (e.g. /birthday-bash) thanks to the
      // next.config.ts rewrite. It may also appear as ?slug= for direct
      // access to event.html. Prefer the path segment, fall back to query.
      const path = window.location.pathname.replace(/^\/+|\/+$/g, "");
      if (path && path !== "event.html") return decodeURIComponent(path);
      const params = new URLSearchParams(window.location.search);
      return params.get("slug") || "";
    }

    function renderLoading() {
      document.getElementById("app").innerHTML = `
        <div class="skeleton h-5 w-24"></div>
        <div class="skeleton mt-6 h-12 w-3/4"></div>
        <div class="skeleton mt-6 h-24 w-full"></div>
        <div class="mt-8 space-y-3">
          <div class="skeleton h-16 w-full"></div>
          <div class="skeleton h-16 w-full"></div>
          <div class="skeleton h-16 w-full"></div>
        </div>
        <div class="skeleton mt-6 h-12 w-full"></div>`;
    }

    function renderError(msg) {
      document.getElementById("app").innerHTML = `
        <div class="mx-auto flex min-h-[60vh] max-w-xl flex-col items-center justify-center gap-6 text-center">
          <div class="rounded-full p-4" style="background:color-mix(in srgb, var(--destructive) 10%, transparent);">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--destructive);"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          </div>
          <div class="space-y-2">
            <h1 class="text-2xl font-semibold">ההזמנה לא נמצאה</h1>
            <p style="color:var(--muted-foreground);">${escapeHtml(msg || "ייתכן שאירוע זה הוסר.")}</p>
          </div>
          <a href="/" class="btn btn-primary">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
            כל האירועים
          </a>
        </div>`;
    }

    function renderEvent(event) {
      document.body.setAttribute("data-theme", event.theme);
      const accent = accentHex(event.accentColor);
      const dateInfo = formatDate(event.eventDate);
      const already = checkAlready(event.slug);

      const detailCard = (icon, label, value, full) => `
        <div class="flex items-start gap-3 rounded-xl border p-4 ${full ? "sm:col-span-2" : ""}" style="border-color:var(--border);background:color-mix(in srgb, var(--card) 70%, transparent);backdrop-filter:blur(4px);">
          <div class="mt-0.5 flex h-9 w-9 shrink-0 items-center justify-center rounded-lg" style="background:${accent}1a;color:${accent};">${icon}</div>
          <div class="min-w-0">
            <p class="text-[11px] font-semibold tracking-wider" style="color:var(--muted-foreground);">${label}</p>
            <p class="mt-0.5 break-words font-medium leading-snug">${escapeHtml(value)}</p>
          </div>
        </div>`;

      const rsvpForm = `
        <form id="rsvp-form" class="rounded-2xl border p-6 sm:p-8" style="border-color:var(--border);background:color-mix(in srgb, var(--card) 80%, transparent);backdrop-filter:blur(4px);box-shadow:0 1px 2px rgba(0,0,0,0.04);">
          <div class="mb-5 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:${accent};"><path d="M5.8 11.3 2 22l10.7-3.79"/><path d="M4 3h.01"/><path d="M22 8h.01"/><path d="M15 2h.01"/><path d="M22 20h.01"/><path d="m22 2-2.24.75a2.9 2.9 0 0 0-1.96 3.12c.1.86-.57 1.63-1.45 1.63h-.38c-.86 0-1.6.6-1.76 1.44L14 10"/><path d="m22 13-1.5.5a2 2 0 0 1-2.55-2.55L18.5 9.5"/></svg>
            <h2 class="text-lg font-semibold">אישור הגעה לאירוע</h2>
          </div>
          <div class="grid gap-4 sm:grid-cols-2">
            <div>
              <label class="label" for="firstName">שם פרטי</label>
              <input class="field" id="firstName" placeholder="ישראלה" autocomplete="given-name" maxlength="80" required />
            </div>
            <div>
              <label class="label" for="lastName">שם משפחה</label>
              <input class="field" id="lastName" placeholder="ישראלי" autocomplete="family-name" maxlength="80" required />
            </div>
          </div>
          <button type="submit" id="submit-btn" class="btn btn-primary btn-lg btn-block mt-6">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5.8 11.3 2 22l10.7-3.79"/><path d="M4 3h.01"/><path d="M22 8h.01"/><path d="M15 2h.01"/><path d="M22 20h.01"/><path d="m22 2-2.24.75a2.9 2.9 0 0 0-1.96 3.12c.1.86-.57 1.63-1.45 1.63h-.38c-.86 0-1.6.6-1.76 1.44L14 10"/><path d="m22 13-1.5.5a2 2 0 0 1-2.55-2.55L18.5 9.5"/></svg>
            אני מגיע/ה!
          </button>
          <p class="mt-3 text-center text-xs" style="color:var(--muted-foreground);">רק את השם שלך — בלי אימייל, בלי ספאם, בלי בלגן.</p>
        </form>`;

      const alreadyHtml = already ? renderAlready(already.name, already.at, accent) : "";

      document.getElementById("app").innerHTML = `
        <div class="flex items-center justify-between">
          <a href="/" class="inline-flex items-center gap-1.5 text-sm no-underline" style="color:var(--muted-foreground);" onmouseover="this.style.color='var(--foreground)';" onmouseout="this.style.color='var(--muted-foreground)';">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
            כל האירועים
          </a>
          <span class="inline-flex items-center gap-1.5 rounded-full border px-3 py-1 text-xs font-medium" style="border-color:var(--border);background:color-mix(in srgb, var(--card) 60%, transparent);color:var(--muted-foreground);backdrop-filter:blur(4px);">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:${accent};"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .962 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.962 0z"/></svg>
            הוזמנת
          </span>
        </div>

        <section class="mt-8 flex flex-1 flex-col animate-fade-in-up">
          <p class="text-xs font-semibold uppercase" style="color:${accent};letter-spacing:0.25em;">${escapeHtml(dateInfo.weekday || "הוזמנת")}</p>
          <h1 class="mt-3 text-4xl font-bold leading-tight tracking-tight sm:text-5xl">${escapeHtml(event.title)}</h1>
          ${event.description ? '<p class="mt-5 whitespace-pre-line text-base leading-relaxed sm:text-lg" style="color:var(--muted-foreground);">' + escapeHtml(event.description) + "</p>" : ""}

          <div class="mt-8 grid gap-3 sm:grid-cols-2">
            ${detailCard('<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>', "תאריך", dateInfo.full || "טרם פורסם")}
            ${detailCard('<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>', "שעה", event.eventTime || "טרם פורסם")}
            ${detailCard('<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg>', "מיקום", event.location || "טרם פורסם", true)}
            ${detailCard('<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>', "ברשימה", event.guestCount + " " + (event.guestCount === 1 ? "אורח" : "אורחים"), true)}
          </div>

          <div class="mt-10" id="rsvp-container">
            ${alreadyHtml || rsvpForm}
          </div>
        </section>

        <footer class="mt-12 border-t pt-6 text-center text-xs" style="border-color:var(--border);color:var(--muted-foreground);">
          <p>לא יכולים להגיע? לא צריך לאשר — פשוט סגרו את הדף. נתראה בקרוב!</p>
          <p class="mt-1">מופעל על ידי <span class="font-semibold">Fête</span> · הזמנות למסיבות</p>
        </footer>`;

      if (!already) {
        document.getElementById("rsvp-form").addEventListener("submit", (e) => handleSubmit(e, event));
      } else {
        const againBtn = document.getElementById("register-again");
        if (againBtn) againBtn.addEventListener("click", () => {
          document.getElementById("rsvp-container").innerHTML = rsvpForm;
          document.getElementById("rsvp-form").addEventListener("submit", (e) => handleSubmit(e, event));
        });
      }
    }

    function checkAlready(slug) {
      try {
        const raw = localStorage.getItem(STORAGE_KEY(slug));
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (parsed && parsed.firstName && parsed.lastName) {
          return {
            name: parsed.firstName + " " + parsed.lastName,
            at: parsed.at ? new Date(parsed.at).toLocaleString("he-IL") : "",
          };
        }
      } catch {}
      return null;
    }

    function renderAlready(name, at, accent) {
      return `
        <div class="rounded-2xl border p-8 text-center" style="border-color:var(--border);background:color-mix(in srgb, var(--card) 80%, transparent);backdrop-filter:blur(4px);">
          <div class="mx-auto flex h-14 w-14 items-center justify-center rounded-full" style="background:${accent}1a;color:${accent};">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <h2 class="mt-4 text-xl font-bold">כבר אישת הגעה</h2>
          <p class="mt-2" style="color:var(--muted-foreground);">יש לנו את <span class="font-semibold" style="color:var(--foreground);">${escapeHtml(name)}</span> ברשימת האורחים${at ? " (נרשם " + escapeHtml(at) + ")" : ""}.</p>
          <p class="mt-1 text-sm" style="color:var(--muted-foreground);">נתראה במסיבה!</p>
          <div class="mt-6 flex flex-col gap-2 sm:flex-row sm:justify-center">
            <a href="/" class="btn btn-outline"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg> חזרה לאירועים</a>
            <button id="register-again" class="btn btn-ghost" style="color:var(--muted-foreground);">אישור הגעה עבור מישהו אחר</button>
          </div>
        </div>`;
    }

    function renderSuccess(name, title, accent) {
      document.getElementById("rsvp-container").innerHTML = `
        <div class="animate-party-pop rounded-2xl border p-8 text-center" style="border-color:var(--border);background:var(--card);box-shadow:0 20px 60px -20px ${accent}55;">
          <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-full" style="background:${accent};color:white;">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <h2 class="mt-5 text-2xl font-bold">אתה ברשימה!</h2>
          <p class="mt-2" style="color:var(--muted-foreground);">תודה <span class="font-semibold" style="color:var(--foreground);">${escapeHtml(name)}</span> — מחכים לראותך ב-</p>
          <p class="mt-1 font-semibold" style="color:${accent};">${escapeHtml(title)}</p>
          <div class="mt-6 flex flex-col gap-2 sm:flex-row sm:justify-center">
            <button id="share-btn" class="btn btn-outline"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg> שיתוף ההזמנה</button>
            <a href="/" class="btn btn-ghost"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg> סיום</a>
          </div>
        </div>`;
      document.getElementById("share-btn").addEventListener("click", () => {
        if (navigator.share) {
          navigator.share({ title, text: "תצטרפו אליי ל-" + title + "!", url: window.location.href }).catch(() => {});
        } else {
          navigator.clipboard && navigator.clipboard.writeText(window.location.href);
        }
      });
    }

    async function handleSubmit(e, event) {
      e.preventDefault();
      const fn = document.getElementById("firstName").value.trim();
      const ln = document.getElementById("lastName").value.trim();
      if (!fn || !ln) {
        showToast("נדרשים שני השמות", "נא להזין שם פרטי ושם משפחה.", "destructive");
        return;
      }
      const btn = document.getElementById("submit-btn");
      btn.disabled = true;
      btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="animate-spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> מוסיף אותך לרשימה…';
      try {
        await rsvp(event.slug, fn, ln);
        try {
          localStorage.setItem(STORAGE_KEY(event.slug), JSON.stringify({ firstName: fn, lastName: ln, at: Date.now() }));
        } catch {}
        const accent = accentHex(event.accentColor);
        fireConfetti(accent);
        renderSuccess(fn + " " + ln, event.title, accent);
        showToast("אתה ברשימה!", "נתראה ב-" + event.title + ".");
      } catch (err) {
        showToast("שליחת האישור נכשלה", err.message, "destructive");
        btn.disabled = false;
        btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5.8 11.3 2 22l10.7-3.79"/><path d="M4 3h.01"/><path d="M22 8h.01"/><path d="M15 2h.01"/><path d="M22 20h.01"/><path d="m22 2-2.24.75a2.9 2.9 0 0 0-1.96 3.12c.1.86-.57 1.63-1.45 1.63h-.38c-.86 0-1.6.6-1.76 1.44L14 10"/><path d="m22 13-1.5.5a2 2 0 0 1-2.55-2.55L18.5 9.5"/></svg> אני מגיע/ה!';
      }
    }

    (async function () {
      const slug = getSlug();
      if (!slug) {
        renderError("חסר מזהה אירוע בכתובת.");
        return;
      }
      renderLoading();
      try {
        const { event } = await fetchEvent(slug);
        renderEvent(event);
      } catch (err) {
        renderError(err.message);
      }
    })();
  </script>
</body>
</html>
